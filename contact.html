<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact WebFlow - Get in touch with our team.">
    <link rel="icon" href="favicon.ico">
    <title>Contact - WebFlow</title>

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--light-bg);
            font-family: var(--font-primary);
            color: var(--text-main);
        }

        /* Contact Hero */
        .contact-hero {
            background: linear-gradient(135deg, rgba(81, 62, 255, 0.9) 0%, rgba(0, 153, 255, 0.9) 100%),
                url('image/Hero-bg.png');
            background-size: cover;
            background-position: center;
            padding: 100px 20px;
            text-align: center;
            color: var(--white);
        }

        .contact-hero h1 {
            font-family: var(--font-secondary);
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        .contact-hero p {
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.95;
            line-height: 1.6;
        }

        /* Contact Container */
        .contact-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .contact-info > div:first-child {
            display: none;
        }

        .contact-info h2 {
            font-family: var(--font-secondary);
            font-size: 70px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .contact-info p {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.8;
        }

        .contact-item {
            display: none;
        }

        .contact-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #513eff 0%, #0099ff 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--white);
            flex-shrink: 0;
        }

        .contact-details h3 {
            font-family: var(--font-secondary);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .contact-details p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .contact-details a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .contact-details a:hover {
            text-decoration: underline;
        }

        /* Contact Form */
        .contact-form {
            background: var(--medium-gray);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .contact-form h3 {
            display: none;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 14px;
            text-transform: none;
            letter-spacing: normal;
            text-align: left;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            font-family: var(--font-primary);
            transition: all 0.3s ease;
            background-color: var(--white);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(81, 62, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #513eff 0%, #0099ff 100%);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: none;
            letter-spacing: normal;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(81, 62, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .contact-hero h1 {
                font-size: 36px;
            }

            .contact-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .contact-info h2 {
                font-size: 28px;
            }

            .contact-form {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .contact-hero h1 {
                font-size: 28px;
            }

            .contact-hero p {
                font-size: 16px;
            }

            .contact-info h2 {
                font-size: 24px;
            }

            .contact-form h3 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <nav>
            <h1 class="nav-title"><span class="nav-web">Web</span><span class="nav-flow">Flow</span></h1>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About Us</a></li>
                <li id="mobileLogoutContainer" style="display: none; width: 100%; margin-top: 10px;">
                    <button id="mobileLogoutBtn" class="btn" style="background: linear-gradient(135deg, #513eff 0%, #0099ff 100%); cursor: pointer; padding: 12px 24px; font-weight: 700; width: 100%; display: block;">Log Out</button>
                </li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul id="navLinks" class="nav-auth">
                <li><a href="signup.html" class="btn">Sign Up</a></li>
            </ul>
        </nav>
    </header>

    <!-- Contact Container -->
    <section class="contact-container">
        <div class="contact-content">
            <!-- Contact Info -->
            <div class="contact-info">
                <h2>Let's Get in Touch</h2>
            </div>

            <!-- Contact Form -->
            <div class="contact-form">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Enter Your Email" required>
                    </div>

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" placeholder="Write Your Message..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Get in Touch</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-logo">
                <h2><span class="footer-web">Web</span><span class="footer-flow">Flow</span></h2>
                <p>Ready to elevate your online presence? Contact us today to discover how we can bring your vision to
                    life.</p>
            </div>

            <ul class="footer-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About Us</a></li>
            </ul>

            <div class="footer-bottom">
                &copy; 2025 WebFlow. All rights reserved.
            </div>
        </div>
    </footer>

    <script>
        // Hamburger menu toggle
        const hamburger = document.getElementById('hamburger');
        const navMenu = document.querySelector('.nav-menu');

        if (hamburger) {
            hamburger.addEventListener('click', function() {
                hamburger.classList.toggle('active');
                navMenu.classList.toggle('active');
            });

            // Close menu when a link is clicked
            const navLinks = navMenu.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', function() {
                    hamburger.classList.remove('active');
                    navMenu.classList.remove('active');
                });
            });
        }

        // Set active link based on current page
        function setActiveLink() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-menu a');
            
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
        }

        // Check if user is logged in on page load
        window.addEventListener('load', function() {
            setActiveLink();
            
            const loggedInUser = localStorage.getItem('loggedInUser');
            const navLinks = document.getElementById('navLinks');
            const mobileLogoutContainer = document.getElementById('mobileLogoutContainer');
            const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');

            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                
                // Desktop logout button
                navLinks.innerHTML = `
                    <li style="display: flex; align-items: center; gap: 20px; list-style: none;">
                        <span style="color: #1a1a1a; font-size: 14px; font-weight: 600;">Welcome, <strong>${user.firstname} ${user.lastname}</strong></span>
                        <button id="logoutBtn" class="btn" style="background: linear-gradient(135deg, #513eff 0%, #0099ff 100%); cursor: pointer; padding: 12px 24px; font-weight: 700;">Log Out</button>
                    </li>
                `;

                // Show mobile logout button
                mobileLogoutContainer.style.display = 'block';

                // Add logout functionality for desktop
                document.getElementById('logoutBtn').addEventListener('click', function() {
                    localStorage.removeItem('loggedInUser');
                    localStorage.removeItem('rememberMe');
                    alert('Logged out successfully!');
                    window.location.href = 'signin.html';
                });

                // Add logout functionality for mobile
                mobileLogoutBtn.addEventListener('click', function() {
                    localStorage.removeItem('loggedInUser');
                    localStorage.removeItem('rememberMe');
                    alert('Logged out successfully!');
                    window.location.href = 'signin.html';
                });
            }

            // Contact form submission
            const contactForm = document.getElementById('contactForm');
            if (contactForm) {
                contactForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    alert('Thank you for your message! We will get back to you soon.');
                    contactForm.reset();
                });
            }
        });
    </script>
</body>

</html>
